name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.19
          - 22.17
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            package.json
            pnpm-workspace.yaml
            packages/*/package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Prettier
        run: pnpm run format:check

      - name: Build packages
        run: pnpm run build

      - name: Run ESLint
        run: pnpm run lint

      - name: Run TypeScript
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm run test

      - name: Check examples
        run: pnpm run examples:check

      - name: Check package output
        run: pnpm run package:check
